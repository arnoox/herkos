# Mapping of test files to the WASM_* spec needs they verify.
# Used by generate_test_needs.py to populate :verifies: links.
#
# Format: [filename_without_extension]
#         verifies = ["WASM_ID_1", "WASM_ID_2", ...]

[arithmetic]
verifies = [
    "WASM_I32_ADD", "WASM_I32_SUB", "WASM_I32_MUL",
    "WASM_I32_CONST", "WASM_I64_ADD", "WASM_I64_CONST",
    "WASM_NOP", "WASM_CALL",
    "WASM_EXEC_INTEGER_OPS",
]

[bulk_memory]
verifies = [
    "WASM_EXEC_MEMORY",
]

[c_e2e]
verifies = [
    "WASM_I32_ADD", "WASM_I32_SUB", "WASM_I32_MUL",
    "WASM_I32_DIV_S", "WASM_I32_REM_S",
    "WASM_I32_AND", "WASM_I32_OR", "WASM_I32_XOR",
    "WASM_I32_SHL", "WASM_I32_SHR_U",
    "WASM_I64_ADD",
    "WASM_MOD_EXPORTS", "WASM_MOD_FUNCTIONS",
]

[c_e2e_i64]
verifies = [
    "WASM_I64_MUL", "WASM_I64_SUB", "WASM_I64_DIV_S",
    "WASM_I64_REM_S", "WASM_I64_AND", "WASM_I64_OR", "WASM_I64_XOR",
    "WASM_I64_SHL", "WASM_I64_SHR_S",
]

