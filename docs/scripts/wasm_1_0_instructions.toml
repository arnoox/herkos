# Wasm 1.0 Instruction Index
# Source: W3C WebAssembly Core Specification 1.0 (https://www.w3.org/TR/wasm-core-1/)
# Each entry produces a {wasm_spec} need in the generated output.

# -- Constants (§2.4.1) --------------------------------------------------------

[constants]
section = "§2.4.1"

[constants.i32]
ops = ["const"]
tags = ["numeric", "i32", "const"]

[constants.i64]
ops = ["const"]
tags = ["numeric", "i64", "const"]

[constants.f32]
ops = ["const"]
tags = ["numeric", "f32", "const"]

[constants.f64]
ops = ["const"]
tags = ["numeric", "f64", "const"]

# -- i32 Numeric Instructions (§2.4.1) ----------------------------------------

[i32_unary]
section = "§2.4.1"
prefix = "i32"
tags = ["numeric", "i32", "unary"]
ops = ["clz", "ctz", "popcnt"]

[i32_test]
section = "§2.4.1"
prefix = "i32"
tags = ["numeric", "i32", "test"]
ops = ["eqz"]

[i32_binop]
section = "§2.4.1"
prefix = "i32"
tags = ["numeric", "i32", "binop"]
ops = ["add", "sub", "mul", "div_s", "div_u", "rem_s", "rem_u", "and", "or", "xor", "shl", "shr_s", "shr_u", "rotl", "rotr"]

[i32_compare]
section = "§2.4.1"
prefix = "i32"
tags = ["numeric", "i32", "comparison"]
ops = ["eq", "ne", "lt_s", "lt_u", "gt_s", "gt_u", "le_s", "le_u", "ge_s", "ge_u"]

